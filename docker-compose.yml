services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:?NEXT_PUBLIC_APP_URL is required}
        NEXT_PUBLIC_GOOGLE_MAPS_API_KEY: ${NEXT_PUBLIC_GOOGLE_MAPS_API_KEY:-}
    image: merchandev-saas-mt-app:latest
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0
      DATABASE_URL: postgresql://${POSTGRES_USER:-metransfers}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres:5432/${POSTGRES_DB:-metransfers_saas}?schema=public
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      AUTH_COOKIE_SECURE: ${AUTH_COOKIE_SECURE:-}
      RECEIPT_TOKEN_SECRET: ${RECEIPT_TOKEN_SECRET:-}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:?NEXT_PUBLIC_APP_URL is required}
      GOOGLE_MAPS_API_KEY: ${GOOGLE_MAPS_API_KEY:-}
      NEXT_PUBLIC_GOOGLE_MAPS_API_KEY: ${NEXT_PUBLIC_GOOGLE_MAPS_API_KEY:-}
      MAPS_DISTANCE_CACHE_TTL_HOURS: ${MAPS_DISTANCE_CACHE_TTL_HOURS:-6}
      RATE_LIMIT_BACKEND: ${RATE_LIMIT_BACKEND:-database}
      SMTP_HOST: ${SMTP_HOST:-smtp.hostinger.com}
      SMTP_PORT: ${SMTP_PORT:-465}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM_NAME: ${SMTP_FROM_NAME:-}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      REDSYS_URL: ${REDSYS_URL:-https://sis.redsys.es/sis/realizarPago}
      REDSYS_MERCHANT_CODE: ${REDSYS_MERCHANT_CODE:?REDSYS_MERCHANT_CODE is required}
      REDSYS_TERMINAL: ${REDSYS_TERMINAL:?REDSYS_TERMINAL is required}
      REDSYS_SECRET_KEY: ${REDSYS_SECRET_KEY:?REDSYS_SECRET_KEY is required}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@transfersinbarcelona.com}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:?ADMIN_PASSWORD is required}
      GA4_PROPERTY_ID: ${GA4_PROPERTY_ID:-}
      GA4_CLIENT_EMAIL: ${GA4_CLIENT_EMAIL:-}
      GA4_PRIVATE_KEY: ${GA4_PRIVATE_KEY:-}
    ports:
      - "0.0.0.0:${APP_PORT:-3100}:3000"
    volumes:
      - media_uploads:/app/public/uploads
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:3000/admin/login').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\"",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-metransfers}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-metransfers_saas}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 5s
      timeout: 5s
      retries: 10

  pgadmin:
    image: dpage/pgadmin4
    profiles: ["dev"]
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-admin@transfersinbarcelona.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-change_me}
    ports:
      - "127.0.0.1:${PGADMIN_PORT:-5051}:80"
    depends_on:
      - postgres
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "/venv/bin/python3 -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:80/misc/ping', timeout=5)\"",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  traefik-bridge:
    image: alpine
    command: tail -f /dev/null
    network_mode: host
    restart: unless-stopped
    depends_on:
      - app
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.mt.rule=Host(`transfersinbarcelona.com`) || Host(`www.transfersinbarcelona.com`)"
      - "traefik.http.routers.mt.entrypoints=websecure"
      - "traefik.http.routers.mt.tls=true"
      - "traefik.http.routers.mt.tls.certresolver=letsencrypt"
      - "traefik.http.routers.mt.tls.domains[0].main=transfersinbarcelona.com"
      - "traefik.http.routers.mt.tls.domains[0].sans=www.transfersinbarcelona.com"
      - "traefik.http.services.mt.loadbalancer.server.port=${APP_PORT:-3100}"

volumes:
  postgres_data:
  media_uploads:
