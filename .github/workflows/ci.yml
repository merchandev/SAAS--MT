name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: metransfers
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d metransfers"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/metransfers?schema=public
      JWT_SECRET: ci-only-jwt-secret-change-in-real-environments
      GOOGLE_MAPS_API_KEY: ci-google-maps-key
      REDSYS_SECRET_KEY: sq7HjrUOBfKmC576ILgskD5srU870gJ7
      REDSYS_MERCHANT_CODE: "999008881"
      REDSYS_TERMINAL: "1"
      NEXT_PUBLIC_APP_URL: http://localhost:3000

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npx prisma migrate deploy
      - run: npm run check
